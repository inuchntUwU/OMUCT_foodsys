<!DOCTYPE html>
<html class="html">
<head>
    <title>Foodsystem</title>
    <meta charset="UTF-8">
    <meta name="language" content="ja">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="body">
    <h1 class="title">Foodsystem</h1>
    <section class="upload-section">
        <h2>食材の情報を入力</h2>
        <p>写真を撮影して食材の重さと賞味期限を入力</p>
 

        <!-- サーバーへ送るデータの枠 -->
        <form id="uploadForm" class="uploadform">
 
            <div class="flex-row">
                <div class="camera">
                    <video id="video" autoplay playsinline></video>
                    <div id="shoot">撮影</div>
                </div>
                <img id="photo" alt="撮影した写真">
            </div>
 
            <br>
            <!-- 食材の名前、重さ、賞味期限の入力フォーム -->
            <label for="foodNameInput">食材の名前：</label>
            <input type="text" id="foodNameInput" placeholder="例: リンゴ" required>
            
            <br><br>
 
            <label for="weightInput">食材の重さ (g)：</label>
            <input type="number" id="weightInput" min="0" placeholder="例: 150" required>
 
            <br><br>
 
            <label for="expiryInput">賞味期限 (日数)：</label>
            <input type="date" id="expiryInput" min="0" placeholder="例: 2026-8-31" required>
 
            <br><br>

            <button type="submit" id="submitBtn" disabled>送信する</button>
        </form>
    </section>
</body>
    
<div class="back-to-home">
    <a href="../home/index.html" class="home-back-btn">🏠 ホームに戻る</a>
</div>
    
<footer class="footer">
    <p>&copy; 2026 Foodsystem. All rights reserved.</p>
</footer>
<script src="script.js"></script>
</html>
