<!DOCTYPE html>
<html>
<head>
    <title>Foodsystem</title>
    <meta charset="UTF-8">
    <meta name="language" content="ja">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="body">
    <h1>Foodsystem</h1>
    <p>写真を取って保存</p>
<section class="upload-section">
  <h2>食材の情報を入力してください</h2>
  <p>写真を撮影し、食材の重さと賞味期限を入力してください。</p>
<form id="uploadForm" class="uploadform">
  <label for="cameraInput">写真を撮影：</label>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" required>
  
  <br><br>

  <label for="weightInput">食材の重さ (g)：</label>
  <input type="number" id="weightInput" min="0" placeholder="例: 150" required>

  <br><br>

  <label for="expiryInput">賞味期限 (日数)：</label>
  <input type="number" id="expiryInput" min="0" placeholder="例: 3" required>

  <br><br>

  <button type="submit">送信する</button>
</form>
</section>

</body>
<footer class="footer">
    <p>&copy; 2026 Foodsystem. All rights reserved.</p>
</footer>
</html>
